<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kenangan Kita ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{

background:linear-gradient(135deg,#ffe5ef,#fff7fb,#ffffff);
overflow:hidden;
height:100vh;

}

h1{

text-align:center;
margin-top:25px;
color:#ff4f87;
font-size:45px;

}

p{

text-align:center;
color:#666;
margin-bottom:30px;

}

.gallery{

position:relative;
width:100%;
height:75vh;

}

.polaroid{

position:absolute;
width:180px;
background:white;
padding:10px 10px 35px;
border-radius:8px;
box-shadow:0 12px 30px rgba(0,0,0,.2);
cursor:pointer;
transition:.5s;

}

.polaroid:hover{

transform:scale(1.08) rotate(0deg);
z-index:100;

}

.polaroid img{

width:100%;
height:180px;
object-fit:cover;

}

.caption{

text-align:center;
margin-top:12px;
font-size:15px;
color:#555;

}

#popup{

display:none;
justify-content:center;
align-items:center;

position:fixed;
left:0;
top:0;

width:100%;
height:100%;

background:rgba(0,0,0,.85);

z-index:999;

}

#popup img{

max-width:80%;
max-height:80%;
border-radius:15px;
box-shadow:0 0 30px white;

animation:zoom .4s;

}

@keyframes zoom{

from{

transform:scale(.5);

}

to{

transform:scale(1);

}

}

button{

position:absolute;
bottom:25px;
left:50%;
transform:translateX(-50%);
padding:15px 40px;
border:none;
border-radius:40px;
background:#ff4f87;
color:white;
font-size:18px;
cursor:pointer;

}

button:hover{

background:#ff77aa;

}

/* posisi foto */

.p1{

left:7%;
top:12%;
transform:rotate(-12deg);

}

.p2{

left:27%;
top:30%;
transform:rotate(8deg);

}

.p3{

left:45%;
top:10%;
transform:rotate(-6deg);

}

.p4{

left:65%;
top:28%;
transform:rotate(10deg);

}

.p5{

left:82%;
top:8%;
transform:rotate(-8deg);

}

</style>

</head>

<body>

<h1>📸 Kenangan Kita</h1>

<p>Klik salah satu foto...</p>

<div class="gallery">

<div class="polaroid p1">
<img src="foto1.jpg" onclick="besar(this.src)">
<div class="caption">Moment 1 ❤️</div>
</div>

<div class="polaroid p2">
<img src="foto2.jpg" onclick="besar(this.src)">
<div class="caption">Moment 2 🌸</div>
</div>

<div class="polaroid p3">
<img src="foto3.jpg" onclick="besar(this.src)">
<div class="caption">Moment 3 ☁️</div>
</div>

<div class="polaroid p4">
<img src="foto4.jpg" onclick="besar(this.src)">
<div class="caption">Moment 4 ✨</div>
</div>

<div class="polaroid p5">
<img src="foto5.jpg" onclick="besar(this.src)">
<div class="caption">Moment 5 💕</div>
</div>

</div>

<button onclick="lanjut()">
Lanjut ❤️
</button>

<div id="popup" onclick="tutup()">

<img id="besar">

</div>

<script>

function besar(src){

document.getElementById("popup").style.display="flex";

document.getElementById("besar").src=src;

}

function tutup(){

document.getElementById("popup").style.display="none";

}

function lanjut(){

window.location="timeline.html";

}

</script>

</body>
</html>
